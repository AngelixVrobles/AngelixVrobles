<svg width="1200" height="16" viewBox="0 0 1200 16" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="separador">
  <defs>
    <linearGradient id="r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0055a5" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#0055a5"/>
      <stop offset="0.82" stop-color="#c79a3a"/>
      <stop offset="1" stop-color="#c79a3a" stop-opacity="0"/>
    </linearGradient>
    <style>
      .node{ transform-box:fill-box; transform-origin:center; animation:pulse 4.5s cubic-bezier(.22,1,.36,1) infinite; }
      @keyframes pulse{ 0%,100%{ transform:scale(1) } 50%{ transform:scale(1.18) } }
      @media (prefers-reduced-motion: reduce){
        .node{ animation:none !important; transform:scale(1) !important }
      }
    </style>
  </defs>
  <line class="line" x1="0" y1="8" x2="1200" y2="8" stroke="url(#r)" stroke-width="2"/>
  <g transform="rotate(45 600 8)"><rect class="node" x="595" y="3" width="10" height="10" rx="2" fill="#c79a3a"/></g>
</svg>
