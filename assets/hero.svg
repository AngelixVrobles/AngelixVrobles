<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Angelix Vasquez R. — Desarrollador Full-Stack: web, movil y escritorio. 6 proyectos reales en produccion para clientes en legal-tech y fintech.">
  <title>Angelix Vasquez R. — Desarrollador Full-Stack</title>
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#0f2034"/>
      <stop offset="1" stop-color="#122438"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(232 150) scale(520 360)">
      <stop offset="0" stop-color="#0055a5" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#0055a5" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0055a5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="64" y1="0" x2="1136" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c79a3a" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#c79a3a" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#0055a5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0055a5" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="300" rx="12"/></clipPath>
    <style>
      .name{ font-family:-apple-system,'Segoe UI',system-ui,'Helvetica Neue',sans-serif; font-weight:700; letter-spacing:-0.5px; }
      .role{ font-family:ui-monospace,'Cascadia Code','SF Mono',Menlo,Consolas,monospace; font-weight:500; letter-spacing:0.5px; }
      .meta{ font-family:ui-monospace,'Cascadia Code','SF Mono',Menlo,Consolas,monospace; letter-spacing:0.5px; }
      .pill{ font-family:ui-monospace,'Cascadia Code','SF Mono',Menlo,Consolas,monospace; font-weight:500; letter-spacing:0.5px; }
      .big{ font-family:-apple-system,'Segoe UI',system-ui,'Helvetica Neue',sans-serif; font-weight:700; letter-spacing:-1px; }

      .glow{ transform-box:fill-box; transform-origin:center; animation:breathe 9s cubic-bezier(.22,1,.36,1) infinite; }
      .rise{ animation:rise .9s cubic-bezier(.22,1,.36,1) both; }
      .d1{ animation-delay:.05s } .d2{ animation-delay:.20s } .d3{ animation-delay:.34s } .d4{ animation-delay:.48s }
      .hair{ transform-box:fill-box; transform-origin:left center; animation:wipe 1.1s cubic-bezier(.22,1,.36,1) .15s both; }
      .blink{ animation:blink 1.15s steps(1) .9s infinite; }
      .chip{ animation:rise .7s cubic-bezier(.22,1,.36,1) both; }
      .c1{ animation-delay:.60s } .c2{ animation-delay:.70s } .c3{ animation-delay:.80s } .c4{ animation-delay:.90s }
      .num{ animation:rise .9s cubic-bezier(.22,1,.36,1) .40s both; }

      @keyframes breathe{ 0%,100%{ opacity:.85; transform:scale(1) } 50%{ opacity:1; transform:scale(1.06) } }
      @keyframes rise{ from{ transform:translateY(12px) } to{ transform:translateY(0) } }
      @keyframes wipe{ from{ transform:scaleX(0) } to{ transform:scaleX(1) } }
      @keyframes blink{ 0%,100%{ opacity:1 } 50%{ opacity:0 } }

      @media (prefers-reduced-motion: reduce){
        .glow,.rise,.hair,.blink,.chip,.num{ animation:none !important; }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#field)"/>
    <ellipse class="glow" cx="232" cy="150" rx="520" ry="360" fill="url(#glow)"/>

    <g stroke="#16314e" stroke-width="1" opacity="0.45">
      <line x1="0" y1="75" x2="1200" y2="75"/>
      <line x1="0" y1="150" x2="1200" y2="150"/>
      <line x1="0" y1="225" x2="1200" y2="225"/>
      <line x1="300" y1="0" x2="300" y2="300"/>
      <line x1="600" y1="0" x2="600" y2="300"/>
      <line x1="900" y1="0" x2="900" y2="300"/>
    </g>

    <text class="meta rise d1" x="66" y="74" fill="#5e86b5" font-size="13">~/angelix-vasquez</text>

    <text class="name rise d2" x="64" y="142" fill="#f4f6f8" font-size="58">Angelix V&#225;squez R.</text>

    <g class="rise d3">
      <text class="role" x="66" y="186" fill="#9bb6d6" font-size="19">Desarrollador Full-Stack</text>
      <text class="role" x="358" y="186" fill="#5e86b5" font-size="19">&#183;  Web &#183; M&#243;vil &#183; Escritorio</text>
    </g>

    <text class="meta rise d4" x="66" y="222" fill="#7f93a8" font-size="14.5">Software en producci&#243;n para clientes en legal-tech y fintech.</text>

    <g transform="translate(66 252)">
      <g class="chip c1"><rect x="0" y="0" width="92" height="30" rx="8" fill="#0f2438" stroke="#1d3a5a"/><text class="pill" x="46" y="20" text-anchor="middle" fill="#9bb6d6" font-size="12.5">React 19</text></g>
      <g class="chip c2"><rect x="102" y="0" width="78" height="30" rx="8" fill="#0f2438" stroke="#1d3a5a"/><text class="pill" x="141" y="20" text-anchor="middle" fill="#9bb6d6" font-size="12.5">Tauri 2</text></g>
      <g class="chip c3"><rect x="190" y="0" width="64" height="30" rx="8" fill="#0f2438" stroke="#1d3a5a"/><text class="pill" x="222" y="20" text-anchor="middle" fill="#9bb6d6" font-size="12.5">Rust</text></g>
      <g class="chip c4"><rect x="264" y="0" width="108" height="30" rx="8" fill="#0f2438" stroke="#1d3a5a"/><text class="pill" x="318" y="20" text-anchor="middle" fill="#9bb6d6" font-size="12.5">Kotlin &#183; Next</text></g>
    </g>

    <g class="num">
      <text class="big" x="978" y="116" fill="#f4f6f8" font-size="74">6</text>
      <text class="meta" x="1026" y="92" fill="#9bb6d6" font-size="14.5">proyectos</text>
      <text class="meta" x="1026" y="112" fill="#9bb6d6" font-size="14.5">reales</text>
      <text class="meta" x="978" y="146" fill="#c79a3a" font-size="12.5" letter-spacing="1.5">EN PRODUCCI&#211;N</text>
    </g>

    <g class="rise d3">
      <text class="meta" x="930" y="256" fill="#5e86b5" font-size="14">build <tspan fill="#3a567a">&#183;</tspan> ship <tspan fill="#3a567a">&#183;</tspan> maintain<tspan class="blink" fill="#c79a3a"> &#9613;</tspan></text>
    </g>

    <rect class="hair" x="64" y="158" width="1072" height="2" fill="url(#hair)"/>
    <rect width="1199" height="299" x="0.5" y="0.5" rx="12" fill="none" stroke="#1d3a5a" stroke-width="1" opacity="0.6"/>
  </g>
</svg>
